        #tag: master
        pullPolicy: IfNotPresent
        pullSecrets: []
        caSubject: "GitLab Helm Chart"
    env: production
    resources:
      requests:
        cpu: 50m
  gitlab-runner:
    install: true
    # missing:
    # - nameOverride, namespaceOverride
    affinity: {}
    nodeSelector: {}
    # hardcoded secret, need to be changed
    certsSecretName: "cicd1-wildcard-tls-chain"
    image:
      registry: registry.gitlab.com
      image: gitlab-org/gitlab-runner
      #tag: alpine-v{{.Chart.AppVersion}}
    imagePullPolicy: IfNotPresent
    imagePullSecrets: []
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
        type: "ClusterIP"
    resources: {}
    service:
      enabled: true
      type: ClusterIP
    strategy: {}
  traefik:
    install: false
    persistence:
      size: "128Mi"
      storageClass: ""
  gitlab:
