      - name: "runner-cache"
      - name: "gitlab-uploads"
      - name: "gitlab-artifacts"
      - name: "gitlab-backups"
      - name: "gitlab-packages"
      - name: "tmp"
      - name: "gitlab-mr-diffs"
      - name: "gitlab-terraform-state"
      - name: "gitlab-ci-secure-files"
      - name: "gitlab-dependency-proxy"
      - name: "gitlab-pages"
    image: "minio/minio"
    #imageTag: "RELEASE.2017-12-28T01-21-00Z"
    imagePullPolicy: IfNotPresent
    deployment:
      strategy:
        type: Recreate
    pullSecrets: []
    persistence:
      enabled: true
      #size: 10Gi
      size: "3Gi"
      storageClass: ""
      accessMode: "ReadWriteOnce"
    metrics:
      serviceMonitor:
        enabled: true
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
