
global:
  sonarqubeApp:
    enabled: true
  harborApp:
    enabled: true
  forgejoApp:
    enabled: true
  gitlabApp:
    enabled: true
  coderApp:
    enabled: true
  jenkinsApp:
    enabled: true


sonarqube:
# missing:
# - nameOverride, namespaceOverride
# - updateStrategy
  affinity: {}
  nodeSelector: {}
  seccompProfile: {}
  securityContext:
    fsGroup: 0
  account:
    adminPassword: "P@ssword1"
  image:
    registry: docker.io
    repository: "sonarqube"
    #tag: 10.6.0-{{ .Values.edition }}
    pullPolicy: "IfNotPresent"
    #pullSecrets: []
  ingress:
    enabled: true
    hosts:
      - name: "sonarqube.apps.example.com"
  networkPolicy:
    enabled: false
  persistence:
    enabled: true
    size: "5Gi"
    storageClass: ""
    accessMode: "ReadWriteOnce"
  plugins:
    # Define the list of plugins to install. Example:
    # install:
    #   - https://example.com/plugin/ver1.0/plugin.jar"
    install: []
  prometheusMonitoring:
    podMonitor:
      enabled: true
  resources:
    limits:
      cpu: "800m"
      memory: "6144Mi"
      ephemeral-storage: "50Gi"
    requests:
      cpu: "400m"
      memory: "2048Mi"
      ephemeral-storage: "512Mi"
  service:
    type: ClusterIP
    externalPort: 9000
    internalPort: 9000
  postgresql:
    primary:
      affinity: {}
      nodeSelector: {}
    enabled: true
    image:
      registry: docker.io
      repository: bitnami/postgresql
      #tag: 11.14.0-debian-10-r22
      pullPolicy: IfNotPresent
      #pullSecrets: 
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
    nameOverride: ""
    networkPolicy:
      enabled: false
    postgresqlUsername: "sonar"
    postgresqlPassword: "P@ssword1"
    postgresqlDatabase: "sonar"
    persistence:
      enabled: true
      existingClaim: "{{ .Release.Name }}-data-gitlab-postgresql-0"
      claimName: "data-postgresql-0"
      size: "20Gi"
      storageClass: ""
      accessMode:
      - "ReadWriteOnce"
    resources:
      limits:
        cpu: "2000m"
        memory: "2Gi"
      requests:
        cpu: "100m"
        memory: "200Mi"
    securityContext:
      enabled: true
      fsGroup: 1001
    service:
      port: 5432
      type: ClusterIP
    updateStrategy:
      type: "RollingUpdate"


harbor:
# missing:
# - nameOverride, namespaceOverride
# - networkPolicy:
  expose:
    type: ingress
    ingress:
      hosts:
        core: harbor.apps.example.com
    nodePort:
      ports:
        http:
          nodePort: 30002
        https:
          nodePort: 30003
  persistence:
    enabled: true
    resourcePolicy: ""
    persistentVolumeClaim:
      registry:
        storageClass: ""
        size: 5Gi
      jobservice:
        storageClass: ""
        size: 1Gi
      database:
        storageClass: ""
        size: 1Gi
      redis:
        storageClass: ""
        size: 1Gi
      trivy:
        storageClass: ""
        size: 5Gi

  imagePullPolicy: IfNotPresent
  #imagePullSecrets:
  ##  - name: docker-registry-secret
  ##  - name: internal-registry-secret
  #
  updateStrategy:
    type: RollingUpdate

  harborAdminPassword: "P@ssword1"
  secretKey: "not-a-secure-key-min-16-characters"

  nginx:
    image:
      repository: goharbor/nginx-photon
      tag: v2.10.2
    nodeSelector: {}
    tolerations: []
    affinity: {}

  portal:
    image:
      repository: goharbor/harbor-portal
      tag: v2.10.2
    nodeSelector: {}
    tolerations: []
    affinity: {}

  core:
    image:
      repository: goharbor/harbor-core
      tag: v2.10.2
    nodeSelector: {}
    tolerations: []
    affinity: {}

  jobservice:
    image:
      repository: goharbor/harbor-jobservice
      tag: v2.10.2
    nodeSelector: {}
    tolerations: []
    affinity: {}

  registry:
    registry:
      image:
        repository: goharbor/registry-photon
        tag: v2.10.2
    controller:
      image:
        repository: goharbor/harbor-registryctl
        tag: v2.10.2
    nodeSelector: {}
    tolerations: []
    affinity: {}
    credentials:
      username: "harbor_registry_user"
      password: "harbor_registry_password"

  trivy:
    image:
      repository: goharbor/trivy-adapter-photon
      tag: v2.10.2
    nodeSelector: {}
    tolerations: []
    affinity: {}

  database:
    internal:
      image:
        repository: goharbor/harbor-db
        tag: v2.10.2
      password: "P@ssword1"
      nodeSelector: {}
      tolerations: []
      affinity: {}

  redis:
    internal:
      image:
        repository: goharbor/redis-photon
        tag: v2.10.2
      nodeSelector: {}
      tolerations: []
      affinity: {}

  exporter:
    image:
      repository: goharbor/harbor-exporter
      tag: v2.10.2
    nodeSelector: {}
    tolerations: []
    affinity: {}

  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
  trace:
    enabled: true
    provider: otel


forgejo:
# missing:
# - nameOverride, namespaceOverride
# - networkPolicy:
  affinity: {}
  nodeSelector: {}
  securityContext: {}
  params:
    additionalConfigSources:
      secret:
        secretName: "forgejo-configuration"
    persistence:
      enabled: true
      create: true
      claimName: "gitea-shared-storage"
      size: "10Gi"
      storageClass: "vsphere-csi"
      accessModes:
        - "ReadWriteOnce"
      annotations: {}
  image:
    registry: "code.forgejo.org"
    repository: "forgejo/forgejo"
    #tag: ''
    pullPolicy: "IfNotPresent"
  imagePullSecrets: []
  gitea:
    admin:
      username: "gitea_admin"
      password: "P@ssword1"
      email: "gitea_admin@example.com"
    config:
      # Forgejo app settings section.
      # Check default values here: https://forgejo.org/docs/latest/admin/config-cheat-sheet/#overall-default
      RUN_MODE: "prod"
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
  ingress:
    enabled: true
    hosts:
      - host: "forgejo.apps.example.com"
        paths:
        - path: "/"
          pathType: "Prefix"
    tls: []
  # default persistence
  persistence:
    enabled: false
  resources: {}
  service:
    http:
      type: "ClusterIP"
      port: 3000
    ssh:
      type: "ClusterIP"
      port: 22
  strategy:
    type: "RollingUpdate"
    rollingUpdate:
      maxSurge: "100%"
      maxUnavailable: 0
  postgresql:
    enabled: false
  postgresql-ha:
    enabled: true
    global:
      postgresql:
        password: "P@ssword1"
        database: "gitea"
        username: "gitea"
    metrics:
      enabled: true
      #collectors:
      #  wal: false
      serviceMonitor:
        enabled: true
    nameOverride: ""
    namespaceOverride: ""
    persistentVolumeClaimRetentionPolicy:
      enabled: true
      whenScaled: "Retain"
      whenDeleted: "Delete"
    postgresql:
      affinity: {}
      nodeSelector: {}
      image:
        registry: docker.io
        repository: bitnami/postgresql-repmgr
        #tag: 16.3.0-debian-12-r18
        pullPolicy: IfNotPresent
        pullSecrets: []
      networkPolicy:
        enabled: true
        allowExternal: true
        allowExternalEgress: true
      repmgrPassword: "P@ssword1"
      postgresPassword: "P@ssword1"
      updateStrategy:
        type: RollingUpdate
    pgpool:
      adminPassword: "P@ssword1"
    resources:
      requests:
        cpu: "250m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"
    service:
      type: ClusterIP
      ports:
        postgresql: 5432
    persistence:
      enabled: true
      size: "8Gi"
      storageClass: ""
      accessModes:
      - ReadWriteOnce
  redis-cluster:
    enabled: true
    usePassword: false
    cluster:
      nodes: 3
      replicas: 0
    image:
      registry: docker.io
      repository: bitnami/redis-cluster
      #tag: 7.2.5-debian-12-r4
      pullPolicy: IfNotPresent
      pullSecrets: []
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
    nameOverride: ""
    networkPolicy:
      enabled: true
      allowExternal: true
      allowExternalEgress: true
    persistence:
      enabled: true
      size: "8Gi"
      storageClass: ""
      accessModes:
      - ReadWriteOnce
    persistentVolumeClaimRetentionPolicy:
      enabled: true
      whenScaled: "Retain"
      whenDeleted: "Delete"
    redis:
      affinity: {}
      nodeSelector: {}
      resources:
        requests:
          cpu: "100m"
          memory: "128Mi"
        limits:
          cpu: "200m"
          memory: "256Mi"
      updateStrategy:
        type: RollingUpdate
        rollingUpdate:
          partition: 0
    service:
      type: ClusterIP
      ports:
        redis: 6379


gitlab:
